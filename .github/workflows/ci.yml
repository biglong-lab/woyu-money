name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: woyu
          POSTGRES_PASSWORD: woyu123
          POSTGRES_DB: woyu_money
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://woyu:woyu123@localhost:5432/woyu_money
      SESSION_SECRET: ci-test-secret
      NODE_ENV: test
      PORT: 5001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安裝依賴
        run: npm ci --legacy-peer-deps

      - name: TypeScript 型別檢查
        run: npx tsc --noEmit

      - name: ESLint（baseline 314 warnings、新增即擋）
        run: npx eslint client/src server shared --max-warnings 100

      - name: 初始化資料庫
        run: npx drizzle-kit push

      - name: 建立測試 admin 帳號（整合測試登入用）
        run: npx tsx server/init-admin.ts
        env:
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin123

      - name: 種子測試資料（多個整合測試硬編 projectId=1）
        run: |
          psql "$DATABASE_URL" -c "INSERT INTO payment_projects (id, project_name, project_type, is_active) VALUES (1, 'CI 測試專案', 'general', true) ON CONFLICT (id) DO NOTHING;"
          psql "$DATABASE_URL" -c "SELECT setval('payment_projects_id_seq', GREATEST(1, (SELECT COALESCE(MAX(id),1) FROM payment_projects)));"

      - name: 執行測試
        run: npm run test:coverage

      - name: 檢查覆蓋率
        run: |
          echo "測試覆蓋率報告已產生"
