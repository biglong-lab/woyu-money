services:
  app:
    build: .
    container_name: woyu-money
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      # 用 container_name 而非 service name 避免跟 PM network 內的 "db" 衝突
      - DATABASE_URL=postgresql://woyu:woyu123@woyu-money-db:5432/woyu_money
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-random-string}
      - NODE_ENV=production
      - PORT=5001
      # AI 辨識（Gemini）— 從 .env 注入；未設定則 AI 辨識會回「Gemini API key 未設定」
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # LINE Bot（可選）
      - LINE_BOT_CHANNEL_ACCESS_TOKEN=${LINE_BOT_CHANNEL_ACCESS_TOKEN:-}
      - LINE_BOT_CHANNEL_SECRET=${LINE_BOT_CHANNEL_SECRET:-}
      # Web Push（VAPID）— 未設定則 Push 端點回 503
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@homi.cc}
      # PM / PMS Bridge — 唯讀同步源資料庫（直連 docker network 內的 PM postgres）
      - PM_DATABASE_URL=${PM_DATABASE_URL:-}
      - PMS_DATABASE_URL=${PMS_DATABASE_URL:-}
    networks:
      - default
      - pm_pm-network
      - pms_default
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: woyu-money-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=woyu
      - POSTGRES_PASSWORD=woyu123
      - POSTGRES_DB=woyu_money
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woyu -d woyu_money"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: woyu_default
  # PM 系統的 docker network — 透過 external 引用、woyu-money 加入後可解析 pm-postgres-prod
  pm_pm-network:
    external: true
  # PMS 系統的 docker network — woyu-money 加入後可解析 pms-postgres
  pms_default:
    external: true

volumes:
  pgdata:
  uploads:
